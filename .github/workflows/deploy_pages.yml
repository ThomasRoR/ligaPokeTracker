name: Deploy Frontend to GitHub Pages

on:
  # Roda o deploy sempre que houver mudanças na branch main dentro da pasta frontend
  push:
    branches: ["main"]
    paths:
      - 'frontend/**'
  # Permite rodar o deploy manualmente na aba Actions
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Fazer upload apenas da pasta frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

      - name: Fazer Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
